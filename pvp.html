<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Age of Fomo · PvP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Grenze+Gotisch:wght@500;700;800&family=MedievalSharp&family=IM+Fell+English:ital@0;1&display=swap');
  :root{
    --bg:#16110c;--bg2:#221a11;--bg3:#120d09;--ink:#ece3d0;--muted:#9a8b6f;
    --brass:#c9a227;--brass-hi:#f0d564;--brass-dim:#7a6420;--ember:#e5533a;
    --line:rgba(201,162,39,.22);--line2:rgba(201,162,39,.4);
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,"Courier New",monospace;
    --display:"Cinzel","Iowan Old Style",Georgia,serif;
    --title:"MedievalSharp","Cinzel",Georgia,serif;
    --flavor:"IM Fell English","Iowan Old Style",Georgia,serif;
  }
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0;background:#0b1a10;color:var(--ink);font-family:var(--mono);overflow:hidden;-webkit-font-smoothing:antialiased}
  .app{height:100dvh;display:flex;flex-direction:column;position:relative}
  /* topbar */
  .topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;padding:7px 14px;z-index:20;
    background:linear-gradient(180deg,rgba(18,13,9,.92),rgba(18,13,9,0));pointer-events:none}
  .topbar>*{pointer-events:auto}
  .brand{display:flex;align-items:center;gap:10px;margin-right:auto}
  .brandlogo{height:38px;width:auto;image-rendering:auto;filter:drop-shadow(0 2px 4px rgba(0,0,0,.6))}
  .ptag{font-family:var(--title);font-size:12px;letter-spacing:.16em;color:var(--brass-hi)}
  .crowns{display:flex;align-items:center;gap:12px;font-family:var(--display);font-weight:700;font-size:15px}
  .crowns .foe{color:#e5533a}.crowns .you{color:#8fbfff}
  .crowns .timer{font-family:var(--mono);font-size:13px;color:var(--brass-hi);font-variant-numeric:tabular-nums;min-width:42px;text-align:center}
  .crowns .timer.low{color:var(--ember)}
  .gbtn{font-family:var(--mono);font-size:11px;font-weight:700;color:#f4ecda;cursor:pointer;background:linear-gradient(180deg,var(--bg2),var(--bg3));border:1px solid var(--line2);border-radius:7px;padding:8px 11px}
  .gbtn:hover{border-color:var(--brass);color:var(--brass-hi)}
  .menuwrap{position:relative}
  .menu{position:absolute;right:0;top:calc(100% + 6px);min-width:150px;background:linear-gradient(180deg,var(--bg2),var(--bg3));border:1px solid var(--line2);border-radius:9px;padding:6px;display:none;flex-direction:column;gap:2px;z-index:60}
  .menu.on{display:flex}
  .menu a{font-family:var(--mono);font-size:12px;color:var(--ink);text-decoration:none;padding:9px 11px;border-radius:6px}
  .menu a:hover{background:rgba(201,162,39,.14);color:var(--brass-hi)}
  /* escenario: fondo atenuado que centra el modal del PvP */
  .pvstage{flex:1;position:relative;min-height:0;display:flex;align-items:center;justify-content:center;padding:10px;
    background:radial-gradient(130% 120% at 50% 28%,#122417,#0a120c 66%,#050906)}
  /* modal chico centrado: tablero + dock juntos */
  .pvmodal{display:inline-flex;flex-direction:column;flex:none;max-width:96vw;border:3px solid var(--brass);border-radius:18px;
    overflow:hidden;background:linear-gradient(180deg,#14100b,#0a0806);
    box-shadow:0 0 0 2px rgba(0,0,0,.6),0 24px 64px rgba(0,0,0,.72),inset 0 0 0 1px rgba(240,213,100,.12)}
  .board{position:relative;height:min(62vh,520px);aspect-ratio:2/3;max-width:96vw;overflow:hidden;background:#0a150e}
  #game{position:absolute;inset:0} #game canvas{display:block}
  /* carta fantasma que sigue al dedo/mouse al arrastrar */
  .dragghost{position:fixed;z-index:9998;width:66px;height:66px;pointer-events:none;transform:translate(-50%,-62%);
    background-size:contain;background-position:center;background-repeat:no-repeat;image-rendering:pixelated;
    filter:drop-shadow(0 7px 11px rgba(0,0,0,.65));opacity:.94}
  /* splash */
  #pvSplash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    background:radial-gradient(120% 120% at 50% 40%,#123d24,#0a1b12 60%,#060d09);transition:opacity .5s}
  #pvSplash.hide{opacity:0;pointer-events:none}
  #pvSplash img{width:min(56vw,320px);height:auto;filter:drop-shadow(0 8px 24px rgba(0,0,0,.6))}
  #pvSplash .lbl{font-family:var(--flavor);font-style:italic;color:var(--muted)}
  #pvBarWrap{width:min(52vw,280px);height:14px;background:#0e2416;border:2px solid #2c6b45;border-radius:9px;overflow:hidden}
  #pvBar{height:100%;width:0%;background:linear-gradient(180deg,#8fe08a,#3f9b52);transition:width .2s}
  /* banner de bloqueados */
  #lockMsg{position:absolute;top:52px;left:50%;transform:translateX(-50%);z-index:16;max-width:92%;text-align:center;
    font-family:var(--mono);font-size:11px;color:#e9b04a;background:rgba(18,13,9,.85);border:1px solid var(--line2);border-radius:8px;padding:7px 13px}
  #lockMsg a{color:var(--brass-hi)}
  /* barra inferior: energía + cartas */
  .dock{position:relative;z-index:18;width:100%;background:linear-gradient(180deg,rgba(18,13,9,.75),rgba(12,9,6,.98));border-top:1px solid var(--line);padding:8px 8px 10px}
  .energy{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .energy .lab{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--muted)}
  .ebar{flex:1;height:17px;display:flex;gap:2px;background:#1a1208;border:1px solid var(--line2);border-radius:8px;padding:2px}
  .eseg{flex:1;border-radius:3px;background:#2b1f10;box-shadow:inset 0 0 0 1px rgba(0,0,0,.35);position:relative;overflow:hidden}
  .eseg .efill{position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(180deg,#e0b3ff,#8a4ad6);transition:width .12s linear}
  .eseg.full .efill{width:100%}
  .eseg.full{box-shadow:inset 0 0 0 1px rgba(240,213,100,.25),0 0 4px rgba(180,110,230,.4)}
  #energyNum{font-family:var(--display);font-weight:800;font-size:16px;color:#e0b3ff;min-width:20px;text-align:center}
  #hand{display:flex;gap:6px;justify-content:center;width:100%}
  .card{position:relative;flex:1 1 0;min-width:0;max-width:80px;height:96px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
    background:linear-gradient(180deg,#2a2013,#160f08);border:2px solid #6b5226;border-radius:11px;padding:5px 3px 4px;
    box-shadow:inset 0 0 0 1px rgba(201,162,39,.18),0 4px 10px rgba(0,0,0,.5);transition:transform .1s,border-color .12s}
  .card:hover{transform:translateY(-3px);border-color:var(--brass)}
  .card.sel{border-color:var(--brass-hi);box-shadow:inset 0 0 0 1px rgba(240,213,100,.5),0 0 16px rgba(240,213,100,.4);transform:translateY(-4px)}
  .card.poor{opacity:.5;filter:grayscale(.4)}
  .card .cthumb{width:100%;max-width:54px;height:48px;background-size:52px 52px;background-position:center;background-repeat:no-repeat;image-rendering:pixelated}
  .card .cname{font-family:var(--display);font-weight:700;font-size:10.5px;line-height:1;color:#f0e6cf;text-align:center;white-space:nowrap;overflow:hidden;max-width:100%;text-overflow:ellipsis}
  .card .ccost{position:absolute;top:-8px;right:-6px;font-family:var(--display);font-weight:800;font-size:12px;color:#120d09;background:linear-gradient(180deg,#d59bff,#a45ee0);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.5)}
  /* toast + fin */
  #pvToast{position:absolute;bottom:150px;left:50%;transform:translateX(-50%);z-index:30;font-family:var(--mono);font-size:12px;color:var(--ink);
    background:rgba(18,13,9,.9);border:1px solid var(--line2);border-radius:8px;padding:8px 14px;opacity:0;transition:.25s;pointer-events:none}
  #pvToast.on{opacity:1}
  #pvEnd{position:absolute;inset:0;z-index:80;display:none;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center,rgba(20,12,7,.72),rgba(6,4,3,.9))}
  #pvEnd.on{display:flex}
  .endbox{text-align:center;background:linear-gradient(180deg,rgba(32,24,15,.98),rgba(17,12,8,.99));border:2px solid #6b5226;border-radius:16px;padding:28px 34px;box-shadow:0 18px 50px rgba(0,0,0,.65)}
  #pvEndT{font-family:var(--title);font-size:34px;margin:0 0 16px;text-shadow:0 3px 0 #000}
  .endbtns{display:flex;gap:10px;justify-content:center}
  .endbtns a,.endbtns button{font-family:var(--display);font-weight:700;font-size:15px;cursor:pointer;text-decoration:none;border-radius:10px;padding:11px 18px;border:2px solid #6b5226;color:var(--ink);background:linear-gradient(180deg,rgba(32,24,15,.97),rgba(17,12,8,.98))}
  .endbtns .primary{border-color:#8a6a26;color:#120d09;background:linear-gradient(180deg,var(--brass-hi),var(--brass))}
  /* home / colección */
  #pvHome{position:absolute;inset:0;z-index:70;display:none;align-items:center;justify-content:center;padding:16px;
    background:radial-gradient(ellipse at center,rgba(20,12,7,.82),rgba(6,4,3,.95))}
  #pvHome.on{display:flex}
  .homebox{width:min(96vw,560px);max-height:92%;display:flex;flex-direction:column;gap:12px;
    background:linear-gradient(180deg,rgba(32,24,15,.98),rgba(17,12,8,.99));border:2px solid #6b5226;border-radius:16px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.65)}
  .homehead{display:flex;align-items:center;justify-content:space-between;font-family:var(--display);font-weight:700}
  .homehead .hstat{font-size:17px;color:var(--ink)}.homehead .hstat b{color:var(--brass-hi)}
  .homehead .harena{font-family:var(--title);font-size:14px;letter-spacing:.06em;color:var(--brass)}
  .collection{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;overflow-y:auto;padding:4px;
    scrollbar-width:thin;scrollbar-color:var(--brass-dim) transparent}
  .ccard{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border:1px solid var(--line2);border-radius:10px;
    background:linear-gradient(180deg,#2a2013,#160f08)}
  .ccard.locked{opacity:.5;filter:grayscale(.7)}
  .ccard .cthumb{width:52px;height:48px;background-size:56px 56px;background-position:center;background-repeat:no-repeat;image-rendering:pixelated}
  .ccard .cname{font-family:var(--display);font-weight:700;font-size:11px;color:#f0e6cf;white-space:nowrap;overflow:hidden;max-width:88px;text-overflow:ellipsis}
  .ccard .clvl{font-family:var(--mono);font-size:9px;color:var(--muted)}
  .ccard .cup{font-family:var(--mono);font-size:10px;font-weight:700;color:#120d09;cursor:pointer;border:none;border-radius:6px;padding:4px 7px;margin-top:2px;background:linear-gradient(180deg,var(--brass-hi),var(--brass))}
  .ccard .cup:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.5)}
  .ccard .cmax{font-family:var(--mono);font-size:10px;color:#8fe08a;margin-top:3px}
  .ccard .clock{font-family:var(--mono);font-size:9px;color:#e9b04a;margin-top:3px}
  .bigbtn{font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:.03em;cursor:pointer;color:#120d09;border:none;border-radius:12px;padding:14px;
    background:linear-gradient(180deg,#ffd76b,#d89a2a);box-shadow:0 6px 18px rgba(216,154,42,.4)}
  .bigbtn:hover{filter:brightness(1.06)}
  @media(max-width:600px){ .brand .ptag{display:none} .card{width:66px;height:90px} .card .cthumb{width:50px;height:46px} }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <img class="brandlogo" src="assets/img/logo_fomo.png" alt="Age of Fomo"/>
      <span class="ptag" data-es="ARENA PvP · BETA" data-en="PvP ARENA · BETA">ARENA PvP · BETA</span>
    </div>
    <div class="crowns"><span class="foe">👑 <span id="crownsFoe">0</span></span><span id="pvTimer" class="timer">2:30</span><span class="you"><span id="crownsYou">0</span> 👑</span></div>
    <button class="gbtn" id="btnSound">SOUND</button>
    <div class="menuwrap">
      <button class="gbtn" id="btnMenu">☰</button>
      <div class="menu" id="pvMenu">
        <a href="/beta" data-es="⚔ Jugar la beta" data-en="⚔ Play the beta">⚔ Jugar la beta</a>
        <a href="/kingdom" data-es="🚶 Visitar el reino" data-en="🚶 Visit the kingdom">🚶 Visitar el reino</a>
        <a href="/live" data-es="👁️ Ver el live" data-en="👁️ Watch live">👁️ Ver el live</a>
        <a href="/" data-es="🏠 Inicio" data-en="🏠 Home">🏠 Inicio</a>
      </div>
    </div>
  </div>

  <div id="pvSplash">
    <img src="assets/img/logo_fomo.png" alt="Age of Fomo"/>
    <div class="lbl" data-es="Preparando la arena…" data-en="Preparing the arena…">Preparando la arena…</div>
    <div id="pvBarWrap"><div id="pvBar"></div></div>
  </div>

  <div class="pvstage">
    <div class="pvmodal">
      <div class="board"><div id="game"></div></div>
      <div class="dock">
        <div class="energy"><span class="lab" data-es="ENERGÍA" data-en="ENERGY">ENERGÍA</span><div class="ebar" id="ebar"></div><span id="energyNum">5</span></div>
        <div id="hand"></div>
      </div>
    </div>
    <div id="lockMsg" style="display:none"></div>
    <div id="pvToast"></div>
    <div id="pvEnd"><div class="endbox">
      <h2 id="pvEndT">—</h2>
      <div id="pvEndSub" style="font-family:var(--mono);font-size:13px;color:var(--muted);margin:-8px 0 16px;line-height:1.6"></div>
      <div class="endbtns">
        <button class="primary" id="pvEndA" onclick="pvpRematch()" data-es="Revancha" data-en="Rematch">Revancha</button>
        <button id="pvEndB" onclick="pvpHome()" data-es="Colección" data-en="Collection">Colección</button>
      </div>
    </div></div>
    <!-- pantalla de inicio: colección de cartas + mejora + batalla -->
    <div id="pvHome"><div class="homebox">
      <div class="homehead">
        <span class="hstat">🏆 <b id="hudTrophies">0</b></span>
        <span id="homeArena" class="harena">Arena: —</span>
        <span class="hstat">🪙 <b id="hudGold">0</b></span>
      </div>
      <div class="collection" id="collection"></div>
      <button class="bigbtn" onclick="pvpBattle()">⚔ <span data-es="BATALLA" data-en="BATTLE">BATALLA</span></button>
    </div></div>
  </div>
</div>

<script src="src/config.js"></script>
<script src="src/pvp.js"></script>
<script>
  // idioma (mismo storage que el resto)
  (function(){ var lang; try{ lang=localStorage.getItem('aoa_lang')||'en'; }catch(e){ lang='en'; }
    document.querySelectorAll('[data-es]').forEach(function(el){ el.textContent = lang==='en'?(el.getAttribute('data-en')||el.textContent):el.getAttribute('data-es'); }); })();
  // menú
  document.getElementById('btnMenu').onclick=function(e){ e.stopPropagation(); document.getElementById('pvMenu').classList.toggle('on'); };
  document.addEventListener('click',function(e){ var m=document.getElementById('pvMenu'),b=document.getElementById('btnMenu'); if(m.classList.contains('on')&&!m.contains(e.target)&&!b.contains(e.target)) m.classList.remove('on'); });
  // red de seguridad del splash
  setTimeout(function(){ var sp=document.getElementById('pvSplash'); if(sp&&!sp.classList.contains('hide')){ sp.classList.add('hide'); setTimeout(function(){ sp.style.display='none'; },600); } },16000);
</script>
</body>
</html>
