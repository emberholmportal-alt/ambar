<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Age of Fomo · Editor de escenarios</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
<style>
  :root{
    --bg:#16110c;--bg2:#221a11;--bg3:#120d09;--ink:#ece3d0;--muted:#9a8b6f;
    --brass:#c9a227;--brass-hi:#f0d564;--brass-dim:#7a6420;--ember:#e5533a;--ok:#5fa55a;
    --line:rgba(201,162,39,.22);--line2:rgba(201,162,39,.4);
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,"Courier New",monospace;
    --display:"Cinzel","Iowan Old Style",Georgia,serif;
  }
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0;background:#0e2029;color:var(--ink);font-family:var(--mono);overflow:hidden;-webkit-font-smoothing:antialiased}
  #game{position:absolute;inset:0} #game canvas{display:block}
  .app{position:fixed;inset:0}

  /* ==== toolbar superior ==== */
  .toolbar{position:absolute;top:0;left:0;right:0;height:48px;z-index:20;display:flex;align-items:center;gap:6px;padding:0 10px;
    background:linear-gradient(180deg,rgba(34,26,17,.97),rgba(18,13,9,.9));border-bottom:1px solid var(--line2)}
  .toolbar .brand{font-family:var(--display);font-weight:800;color:var(--brass-hi);letter-spacing:.04em;font-size:14px;margin-right:8px}
  .tbtn{font-family:var(--mono);font-size:12px;font-weight:700;color:#f4ecda;cursor:pointer;background:linear-gradient(180deg,var(--bg2),var(--bg3));
    border:1px solid var(--line2);border-radius:7px;padding:7px 11px;display:inline-flex;align-items:center;gap:6px}
  .tbtn:hover{border-color:var(--brass);color:var(--brass-hi)}
  .tbtn.on{background:linear-gradient(180deg,#3a2c17,#2a2011);border-color:var(--brass);color:var(--brass-hi);box-shadow:inset 0 0 0 1px rgba(240,213,100,.25)}
  .tbtn.warn:hover{border-color:var(--ember);color:var(--ember)}
  .sep{width:1px;height:26px;background:var(--line2);margin:0 4px}
  .tbar-r{margin-left:auto;display:flex;align-items:center;gap:6px}
  .zoominfo{font-size:11px;color:var(--muted);min-width:52px;text-align:right}

  /* ==== paleta (izquierda) ==== */
  .palette{position:absolute;top:48px;bottom:0;left:0;width:230px;z-index:16;display:flex;flex-direction:column;
    background:linear-gradient(180deg,rgba(28,21,13,.97),rgba(16,11,7,.97));border-right:1px solid var(--line2)}
  .palette.hide{transform:translateX(-231px)}
  .pcats{display:flex;flex-wrap:wrap;gap:3px;padding:8px;border-bottom:1px solid var(--line)}
  .pcat{font-size:10px;font-weight:700;letter-spacing:.02em;color:var(--muted);cursor:pointer;background:var(--bg3);border:1px solid var(--line);border-radius:6px;padding:5px 7px;text-transform:capitalize}
  .pcat:hover{color:var(--brass-hi)} .pcat.on{color:var(--brass-hi);border-color:var(--brass);background:#2a2011}
  .psearch{margin:8px;background:#120d09;border:1px solid var(--line2);border-radius:7px;color:var(--ink);font-family:var(--mono);font-size:12px;padding:7px 9px}
  .psearch:focus{outline:none;border-color:var(--brass)}
  .pgrid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px;align-content:start}
  .pitem{aspect-ratio:1;background:#0c1419 center/70% no-repeat;border:1px solid var(--line);border-radius:8px;cursor:pointer;
    image-rendering:pixelated;position:relative;overflow:hidden}
  .pitem:hover{border-color:var(--brass);background-color:#13202a}
  .pitem.on{border-color:var(--brass-hi);box-shadow:inset 0 0 0 1px var(--brass-hi)}
  .pitem .anim{position:absolute;inset:0;image-rendering:pixelated;background-repeat:no-repeat;background-position-x:0%}
  @keyframes sheet{from{background-position-x:0%}to{background-position-x:100%}}
  .pcount{font-size:10px;color:var(--muted);text-align:center;padding:4px}

  /* ==== inspector del objeto seleccionado (derecha) ==== */
  .inspector{position:absolute;top:56px;right:10px;width:198px;z-index:16;display:none;flex-direction:column;gap:8px;
    background:linear-gradient(180deg,rgba(28,21,13,.97),rgba(16,11,7,.97));border:1px solid var(--line2);border-radius:11px;padding:11px}
  .inspector.on{display:flex}
  .inspector h4{font-family:var(--display);font-size:12px;color:var(--brass-hi);margin:0 0 2px;letter-spacing:.04em}
  .irow{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
  .irow label{width:44px} .irow input[type=range]{flex:1}
  .irow .val{width:34px;text-align:right;color:var(--ink);font-variant-numeric:tabular-nums}
  .ibtns{display:flex;gap:5px;flex-wrap:wrap}
  .ibtn{flex:1;min-width:56px;font-size:11px;font-weight:700;color:#f4ecda;cursor:pointer;background:linear-gradient(180deg,var(--bg2),var(--bg3));border:1px solid var(--line2);border-radius:7px;padding:7px 6px;text-align:center}
  .ibtn:hover{border-color:var(--brass);color:var(--brass-hi)} .ibtn.del:hover{border-color:var(--ember);color:var(--ember)}

  /* ==== ayuda / atajos ==== */
  .help{position:absolute;left:240px;bottom:10px;z-index:15;font-size:10.5px;color:var(--muted);background:rgba(12,9,6,.8);border:1px solid var(--line);border-radius:8px;padding:7px 10px;line-height:1.5;max-width:420px}
  .help b{color:var(--brass-hi)}
  .toast{position:absolute;top:58px;left:50%;transform:translateX(-50%);z-index:30;background:rgba(18,13,9,.95);border:1px solid var(--brass);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--brass-hi);opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.on{opacity:1}
  @media(max-width:640px){ .palette{width:170px} .pgrid{grid-template-columns:repeat(2,1fr)} .help{display:none} .inspector{width:160px} }
</style>
</head>
<body>
  <div class="app">
    <div id="game"></div>

    <div class="toolbar">
      <span class="brand">⚔ Editor</span>
      <button class="tbtn on" id="toolSelect" title="Seleccionar / mover (V)">▧ Seleccionar</button>
      <button class="tbtn" id="toolPan" title="Mover cámara (H / barra espaciadora)">✋ Mano</button>
      <span class="sep"></span>
      <button class="tbtn" id="btnGrid" title="Cuadrícula (G)">▦ Cuadrícula</button>
      <button class="tbtn" id="btnSnap" title="Ajustar a la cuadrícula">⊹ Snap</button>
      <button class="tbtn" id="btnZone" title="Agregar zona nueva">＋ Zona</button>
      <span class="sep"></span>
      <button class="tbtn" id="brGrass" title="Pintar pasto (isla)">🌿 Pasto</button>
      <button class="tbtn" id="brSand" title="Pintar arena / camino">🏝 Arena</button>
      <button class="tbtn" id="brElev" title="Pintar elevación (meseta)">⛰ Meseta</button>
      <button class="tbtn" id="brWater" title="Borrar a agua">🌊 Agua</button>
      <select id="brSize" title="Tamaño del pincel" style="background:var(--bg3);color:var(--ink);border:1px solid var(--line2);border-radius:6px;font-family:var(--mono);font-size:11px;padding:6px">
        <option value="1">1×1</option><option value="3" selected>3×3</option><option value="5">5×5</option></select>
      <span class="sep"></span>
      <button class="tbtn" id="btnSave" title="Guardar (Ctrl+S)">💾 Guardar</button>
      <button class="tbtn" id="btnExport" title="Exportar JSON">⤓ Exportar</button>
      <button class="tbtn" id="btnImport" title="Importar JSON">⤒ Importar</button>
      <button class="tbtn warn" id="btnClear" title="Vaciar todo">🗑 Vaciar</button>
      <input type="file" id="fileIn" accept="application/json" style="display:none"/>
      <div class="tbar-r">
        <button class="tbtn" id="btnPalette" title="Ocultar/mostrar paleta">☰</button>
        <span class="zoominfo" id="zoomInfo">100%</span>
      </div>
    </div>

    <div class="palette" id="palette">
      <div class="pcats" id="pcats"></div>
      <input class="psearch" id="psearch" placeholder="Buscar asset…"/>
      <div class="pgrid" id="pgrid"></div>
      <div class="pcount" id="pcount"></div>
    </div>

    <div class="inspector" id="inspector">
      <h4>Objeto seleccionado</h4>
      <div class="irow"><label>Escala</label><input type="range" id="inScale" min="10" max="400" value="100"/><span class="val" id="inScaleV">100%</span></div>
      <div class="irow"><label>Giro</label><input type="range" id="inAngle" min="-180" max="180" value="0"/><span class="val" id="inAngleV">0°</span></div>
      <div class="ibtns">
        <button class="ibtn" id="inDup">⧉ Duplicar</button>
        <button class="ibtn" id="inFlip">⇋ Espejar</button>
        <button class="ibtn" id="inFront">▲ Frente</button>
        <button class="ibtn" id="inBack">▼ Fondo</button>
        <button class="ibtn del" id="inDel">🗑 Borrar</button>
      </div>
    </div>

    <div class="help" id="help">
      <b>Colocá:</b> elegí un asset y hacé click en el mapa · <b>Mover:</b> arrastrá · <b>Cámara:</b> rueda = zoom, arrastrar vacío / barra espaciadora = pan · <b>Escalar:</b> [ ] · <b>Girar:</b> , . · <b>Duplicar:</b> Ctrl+D · <b>Borrar:</b> Supr
    </div>
    <div class="toast" id="toast"></div>
  </div>

  <script src="src/editor.js"></script>
</body>
</html>
