<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Age of Ansem · The Black Bull</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@500;700;800&family=MedievalSharp&family=IM+Fell+English:ital@0;1&display=swap');
  :root{
    --bg:#16110c;--bg2:#221a11;--bg3:#120d09;--ink:#ece3d0;--muted:#9a8b6f;
    --brass:#c9a227;--brass-hi:#f0d564;--brass-dim:#7a6420;--ember:#e5533a;
    --line:rgba(201,162,39,.22);--line2:rgba(201,162,39,.4);
    --ok:#5fa55a;--bad:#c94f45;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,"Courier New",monospace;
    --display:"Grenze Gotisch","Iowan Old Style",Georgia,serif;
    --title:"MedievalSharp","Grenze Gotisch",Georgia,serif;
    --flavor:"IM Fell English","Iowan Old Style",Georgia,serif;
  }
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);overflow:hidden}
  .app{height:100dvh;display:flex;flex-direction:column}
  /* scrollbars temáticos */
  *{scrollbar-width:thin;scrollbar-color:var(--brass-dim) transparent}
  *::-webkit-scrollbar{width:7px;height:7px}
  *::-webkit-scrollbar-track{background:rgba(0,0,0,.25);border-radius:4px}
  *::-webkit-scrollbar-thumb{background:linear-gradient(var(--brass-dim),#5a4a18);border-radius:4px;border:1px solid rgba(0,0,0,.35)}
  *::-webkit-scrollbar-thumb:hover{background:var(--brass)}
  /* marcos con doble filete dorado (estética AoE) */
  .frame{background:linear-gradient(180deg,var(--bg2),var(--bg3));border:1px solid var(--line2);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.55), inset 0 0 0 3px rgba(201,162,39,.10), 0 3px 10px rgba(0,0,0,.5)}

  /* ---- TOP flotante: título chico + botón menú en la esquina (sin barra) ---- */
  .titlechip{position:absolute;top:9px;left:50%;transform:translateX(-50%);z-index:30;padding:4px 20px 6px;border-radius:9px;text-align:center;pointer-events:none}
  .titlechip .game{font-family:var(--title);font-size:18px;line-height:1;color:var(--brass-hi);letter-spacing:.03em;text-shadow:0 2px 0 #000,0 0 8px rgba(0,0,0,.6)}
  .titlechip .game b{color:#f0d564}
  .titlechip .sub{font-family:var(--flavor);font-style:italic;font-size:10px;color:var(--muted);margin-top:1px}
  .menuwrap{position:absolute;top:9px;right:12px;z-index:40}
  .iconbtn{width:44px;height:44px;font-size:20px;color:#f4ecda;cursor:pointer;display:block;
    background:url('assets/img/ui/ribbon_yellow.png') center/100% 100% no-repeat;border:none;image-rendering:pixelated;
    text-shadow:0 1px 2px rgba(10,20,40,.8)}
  .iconbtn:hover{filter:brightness(1.15)}
  .menu{position:absolute;top:50px;right:0;width:210px;display:none;flex-direction:column;gap:6px;padding:10px;border-radius:8px;z-index:41}
  .menu.open{display:flex}
  .menu button{width:100%}
  /* panel de OLEADA arriba del minimapa */
  .wavebar{padding:6px 9px 7px;border-radius:6px;font-size:11px;line-height:1.35;text-align:center;font-variant-numeric:tabular-nums;
    background:linear-gradient(180deg,#241a10,#140f0a);border:1px solid var(--line)}
  .wavebar b{color:var(--brass)} .wavebar .pts{color:var(--brass-hi)}
  .wavebar.enwave{border-color:var(--ember);color:#ffd9d0;animation:rpulse 1.3s ease-in-out infinite}
  button.ghost{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.05em;color:#f4ecda;
    background:url('assets/img/ui/ribbon_blue.png') center/100% 100% no-repeat;border:none;padding:9px 12px 11px;cursor:pointer;
    min-width:60px;image-rendering:pixelated;text-shadow:0 1px 2px rgba(10,20,40,.85)}
  button.ghost:hover{filter:brightness(1.14)} button.ghost:active{filter:brightness(.85)}
  button.ghost:disabled{filter:grayscale(1) brightness(.62);cursor:not-allowed}

  /* ---- viewport ---- */
  .stage{flex:1;position:relative;min-height:0;background:#0a0f12}
  #game{position:absolute;inset:0} #game canvas{display:block}
  .hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(18,13,9,.85);border:1px solid var(--line);border-radius:4px;padding:6px 14px;font-size:11px;z-index:10;pointer-events:none;opacity:0;transition:.25s}
  .hint.on{opacity:1}
  .qbox{position:absolute;right:12px;top:62px;width:200px;border-radius:8px;padding:10px 11px;z-index:11}
  .qbox .qh{font-family:var(--display);font-weight:700;font-size:11px;letter-spacing:.18em;color:var(--brass);margin-bottom:4px}
  .qbox .qt{font-size:11px;line-height:1.45;margin-bottom:7px}
  .qbox button{width:100%;font-size:10px;padding:7px 6px 9px}
  .qbox.done{box-shadow:inset 0 0 0 1px var(--brass), 0 0 14px rgba(201,162,39,.3)}
  .raidbanner{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(90,20,15,.92);border:1px solid var(--ember);border-radius:4px;padding:8px 18px;font-size:12px;font-weight:700;letter-spacing:.08em;color:#ffd9d0;z-index:12;display:none;animation:rpulse 1.1s ease-in-out infinite}
  .raidbanner.on{display:block}
  @keyframes rpulse{0%,100%{opacity:1}50%{opacity:.65}}
  .agepop{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%) scale(.7);opacity:0;z-index:25;pointer-events:none;
    text-align:center;padding:22px 60px 30px;background:url('assets/img/ui/banner.png') center/100% 100% no-repeat;image-rendering:pixelated}
  .agepop.on{animation:agepop 2.6s ease-out forwards}
  .agepop .t1{font-family:var(--title);font-size:15px;color:#6b3410}
  .agepop .t2{font-family:var(--title);font-size:30px;color:#3a2a12;line-height:1}
  @keyframes agepop{0%{opacity:0;transform:translate(-50%,-50%) scale(.7)}15%{opacity:1;transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-58%) scale(1)}}
  .toast{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(18,13,9,.92);border:1px solid var(--brass-dim);border-radius:4px;padding:8px 16px;font-size:12px;z-index:30;opacity:0;transition:.3s;pointer-events:none}
  .toast.on{opacity:1}
  /* ---- GAME OVER (fin del asedio) ---- */
  .gameover{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    background:radial-gradient(ellipse at center,rgba(30,10,8,.82),rgba(6,4,3,.94));z-index:60;text-align:center}
  .gameover.on{display:flex}
  .gameover .gtitle{font-family:var(--title);font-size:40px;color:var(--ember);text-shadow:0 3px 0 #000;letter-spacing:.04em}
  .gameover .gstat{font-family:var(--display);font-size:17px;color:var(--ink)}
  .gameover .gstat b{color:var(--brass)}
  .gameover button{margin-top:14px;font-size:14px;padding:12px 22px 14px}

  /* ---- PANEL INFERIOR: minimapa + recursos · selección · construcción ---- */
  .bottom{display:flex;gap:10px;padding:8px 12px;background:linear-gradient(0deg,#0d0906,#1b140d);border-top:2px solid var(--brass-dim);z-index:20;height:214px}
  .leftcol{flex:0 0 auto;display:flex;flex-direction:column;gap:7px}
  .mapbox{border:2px solid var(--brass-dim);border-radius:6px;background:#000;box-shadow:inset 0 0 0 1px rgba(0,0,0,.6)}
  #minimap{display:block;image-rendering:pixelated;cursor:crosshair;border-radius:4px}
  /* recursos DEBAJO del minimapa (rellena el hueco) */
  .resbar{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  .res{display:flex;align-items:center;gap:6px;padding:3px 8px 3px 4px;font-size:12px;font-variant-numeric:tabular-nums;border-radius:5px;
    background:linear-gradient(180deg,#241a10,#140f0a);border:1px solid var(--line)}
  .res img{width:22px;height:22px;image-rendering:pixelated}
  .res.lleno{border-color:var(--ember)}
  .res .cap{font-size:8.5px;color:var(--muted)}
  .res.wide{grid-column:1 / -1;justify-content:center;gap:10px}
  .ambar{color:var(--brass);font-weight:700}
  .ambar::before{content:"◆ ";color:var(--brass)}

  .selbox{flex:0 0 236px;border-radius:8px;padding:9px 9px 9px 11px;overflow-y:auto;position:relative;
    box-shadow:inset 3px 0 0 -1px var(--brass-dim), inset 0 0 0 1px rgba(0,0,0,.5)}
  .selav{display:none;width:52px;height:52px;float:right;border-radius:6px;border:2px solid var(--brass-dim);
    image-rendering:pixelated;object-fit:cover;object-position:50% 22%;margin:0 0 4px 6px;background:#0d0906}
  .selbox h3{margin:0 0 2px;font-family:var(--display);font-weight:700;font-size:16px;color:var(--ink);letter-spacing:.01em}
  /* crónica (feed con avatar) */
  .cronica{position:absolute;left:12px;top:12px;width:210px;border-radius:8px;padding:8px 9px;z-index:11}
  .cronica .ch{font-family:var(--display);font-weight:700;font-size:11px;letter-spacing:.16em;color:var(--brass);margin-bottom:4px}
  .crow{display:flex;align-items:center;gap:7px;font-size:9.5px;line-height:1.15;padding:4px 0;border-top:1px solid var(--line)}
  .crow img{width:26px;height:26px;border-radius:4px;image-rendering:pixelated;border:1px solid var(--line2);object-fit:cover;object-position:50% 22%;flex:0 0 auto}
  .crow span{color:var(--ink)}
  .selbox .lvl{font-family:var(--mono);font-size:9.5px;color:var(--brass);margin-bottom:4px}
  .selbox .hpbar{height:9px;background:#2a2018;border:1px solid var(--line);border-radius:3px;margin:4px 0 8px;overflow:hidden}
  .selbox .hpbar i{display:block;height:100%;background:var(--ok);transition:width .2s}
  .selbox .vacio{font-size:10px;color:var(--muted);line-height:1.45;margin-top:6px}
  #selActions{display:flex;flex-direction:column;gap:4px}
  #selActions button{width:100%;font-size:9.5px;padding:5px 5px 7px}

  .gridbox{flex:1;border-radius:8px;padding:8px 8px 8px 6px;overflow-x:auto;display:flex;gap:8px;align-items:flex-start}
  .gridbox .gh{writing-mode:vertical-rl;transform:rotate(180deg);font-family:var(--display);font-weight:700;font-size:11px;
    letter-spacing:.16em;color:var(--brass);align-self:stretch;text-align:center;padding:2px 0}
  .card{flex:0 0 auto;width:94px;border-radius:7px;padding:5px;cursor:pointer;text-align:center;transition:.12s;
    background:linear-gradient(180deg,#241a10,#150f0a);border:1px solid var(--line);box-shadow:inset 0 0 0 1px rgba(0,0,0,.4)}
  .card:hover{border-color:var(--brass);transform:translateY(-1px)}
  .card.sel{border-color:var(--brass-hi);background:rgba(201,162,39,.1)}
  .card.lock{opacity:.5;cursor:not-allowed}
  .card img{height:40px;image-rendering:pixelated;margin:2px auto}
  .card .nom{font-family:var(--display);font-weight:700;font-size:11px;line-height:1.05}
  .card .costo{font-size:8.5px;color:var(--muted);margin-top:1px;line-height:1.45}
  .card .costo b{color:var(--ink)}
  .card .req{font-size:8px;color:var(--ember)}
  .gridmsg{align-self:center;color:var(--muted);font-size:11px;line-height:1.6;padding:6px 12px;max-width:380px}
  @media(max-width:900px){ .selbox{flex-basis:190px} .bottom{height:190px} .agebanner{min-width:240px} .agebanner .game{font-size:17px} }
</style>
</head>
<body>
<div class="app">
  <div class="stage">
    <div id="game"></div>
    <div class="titlechip" id="ageBanner">
      <div class="game">AGE OF <b>ANSEM</b></div>
      <div class="sub">The Black Bull</div>
    </div>
    <div class="menuwrap">
      <button class="iconbtn" id="btnMenu" title="Menú">☰</button>
      <div class="menu frame" id="menu">
        <button class="ghost" id="btnOleada" title="Adelantar la oleada por puntos extra">⚔️ OLEADA YA</button>
        <button class="ghost" id="btnIdle" title="Ir al próximo aldeano ocioso">💤 IDLE (0)</button>
        <button class="ghost" id="btnCaravana" title="+250 del recurso más bajo">◆ CARAVANA (8)</button>
        <button class="ghost" id="btnMercen" style="display:none">◆ MERCENARIOS (10)</button>
        <button class="ghost" id="btnTiempo">⏱ ×1</button>
        <button class="ghost" id="btnAudio" title="Música / ambiente">🔊 SONIDO</button>
      </div>
    </div>
    <div class="hint" id="hint"></div>
    <div class="qbox frame" id="qBox">
      <div class="qh">⚑ MISIÓN</div>
      <div class="qt" id="qTxt">—</div>
      <button class="ghost" id="btnQuest">···</button>
    </div>
    <div class="cronica frame" id="cronica"><div class="ch">⚜ CRÓNICA</div><div id="cronicaList"></div></div>
    <div class="raidbanner" id="raidbanner">⚔️ ¡ASALTO GOBLIN EN CURSO!</div>
    <div class="agepop" id="agePop"><div class="t1" id="agePop1">NUEVA EDAD</div><div class="t2" id="agePop2">—</div></div>
    <div class="toast" id="toast"></div>
  </div>
  <div class="bottom">
    <div class="leftcol">
      <div class="wavebar" id="waveBar">🛡️ Preparación…</div>
      <div class="mapbox"><canvas id="minimap" width="220" height="132"></canvas></div>
      <div class="resbar">
        <div class="res" id="rOro"><img src="assets/img/ts/res_gold.png" alt="oro"><span id="vOro">0</span><span class="cap" id="cOro"></span></div>
        <div class="res" id="rMad"><img src="assets/img/ts/res_wood.png" alt="madera"><span id="vMad">0</span><span class="cap" id="cMad"></span></div>
        <div class="res" id="rCom"><img src="assets/img/ts/res_meat.png" alt="comida"><span id="vCom">0</span><span class="cap" id="cCom"></span></div>
        <div class="res" title="Población / cupo">👤 <span id="vAld">0/0</span></div>
        <div class="res wide ambar" title="Moneda del juego (simulada · placeholder F4)"><span id="vAmbar">0</span> $AOA</div>
      </div>
    </div>
    <div class="selbox frame">
      <img id="selAv" class="selav" alt="">
      <h3 id="selNom">—</h3>
      <div class="lvl" id="selLvl"></div>
      <div class="hpbar" id="selHpWrap" style="display:none"><i id="selHp" style="width:100%"></i></div>
      <div id="selActions"></div>
      <div class="vacio" id="selVacio">Clic izquierdo: seleccionar aldeano, edificio, árbol, veta o animal.<br>Clic derecho con aldeano: ir / talar / minar / cazar.</div>
    </div>
    <div class="gridbox frame" id="buildbox">
      <div class="gh" id="gridTitle">CONSTRUIR</div>
      <div id="buildgrid" style="display:flex;gap:8px"></div>
    </div>
  </div>
</div>
<script src="src/base.js"></script>
</body>
</html>
